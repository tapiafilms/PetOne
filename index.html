<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PetOne - Todo para tu Mascota</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Tu tienda multicategoría de confianza para alimentos, accesorios, farmacia y servicios para mascotas.">
  <meta name="theme-color" content="#0a0f1d">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/logo-petone.png">
  
  <!-- PWA iOS support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PetOne">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  
  <!-- Google Fonts & Material Symbols -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  
  <style>
    /* Prevent raw HTML flash before CSS loads */
    body {
      background-color: #0a0f1d;
      margin: 0;
      font-family: 'Outfit', sans-serif;
      color: #f8fafc;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- App entry point where components will render -->
    <div id="app-loader" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 1rem;">
      <div class="loader" style="width: 48px; height: 48px; border: 4px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <p style="color: #94a3b8; font-weight: 500;">Cargando PetOne...</p>
    </div>
  </div>
  
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
